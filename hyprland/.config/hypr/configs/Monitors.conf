# External monitor on the LEFT
monitor = DP-5, 1920x1080@120, 0x0, 1

# Laptop display on the RIGHT
monitor = eDP-1, 2560x1600@240, 1920x0, 1

# Fallback DP ports
monitor = DP-1, 1920x1080@120, 0x0, 1
monitor = DP-2, 1920x1080@120, 0x0, 1
monitor = DP-3, 1920x1080@120, 0x0, 1
monitor = DP-1-3, 1920x1080@120, 0x0, 1

# Fallback for any unknown monitor
monitor = , preferred, auto, 1

# Workspace-to-monitor bindings
workspace = 1, monitor:DP-5, default:true
workspace = 2, monitor:DP-5
workspace = 5, monitor:eDP-1
