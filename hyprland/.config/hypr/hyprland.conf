# Hyprland Config — HyprFlux-based with i3 keybindings

# Color palette
source = $HOME/.config/hypr/hyprflux-colors/hyprflux-colors.conf

# Configs directory
$configs = $HOME/.config/hypr/configs

# Monitor setup
source = $configs/Monitors.conf

# Environment variables
source = $configs/ENVariables.conf

# Core settings (dwindle, input, misc, cursor)
source = $configs/UserSettings.conf

# Decorations (blur, rounding, opacity)
source = $configs/UserDecorations.conf

# Animations
source = $configs/UserAnimations.conf

# Window and layer rules
source = $configs/WindowRules.conf

# Keybindings ($mod = ALT, i3-style)
source = $configs/Keybinds.conf

# Startup applications
source = $configs/Startup_Apps.conf
