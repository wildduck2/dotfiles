$mod = ALT
$scriptsDir = $HOME/.config/hypr/scripts

# Essentials
bind = $mod, Return, exec, terminator
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh
bind = $mod, D, exec, bash -c 'pkill rofi || rofi -show drun -modi drun,run,filebrowser'
bind = $mod SHIFT, D, exec, bash -c 'pkill rofi || rofi -show run'
bind = $mod CTRL, P, exec, pavucontrol
bind = $mod CTRL, B, exec, blueman-manager
bind = $mod, N, exec, swaync-client -t -sw

# Focus (vim-style)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move window (vim-style)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Layout
bind = $mod, z, layoutmsg, preselect r
bind = $mod, v, layoutmsg, preselect d
bind = $mod, f, fullscreen, 0
bind = $mod SHIFT, f, fullscreen, 1
bind = $mod, s, togglegroup,
bind = $mod, w, togglegroup,
bind = $mod, e, togglesplit,
bind = $mod SHIFT, space, togglefloating,
bind = $mod, a, changegroupactive, f
bind = $mod SHIFT, v, exec, $scriptsDir/ClipManager.sh

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Monitor
bind = $mod, m, movecurrentworkspacetomonitor, l

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Management
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, r, exec, $scriptsDir/Refresh.sh
bind = $mod SHIFT, e, exec, $scriptsDir/Wlogout.sh

# Resize submap
bind = $mod, r, submap, resize
submap = resize
binde = , h, resizeactive, -40 0
binde = , j, resizeactive, 0 40
binde = , k, resizeactive, 0 -40
binde = , l, resizeactive, 40 0
binde = , Left, resizeactive, -40 0
binde = , Down, resizeactive, 0 40
binde = , Up, resizeactive, 0 -40
binde = , Right, resizeactive, 40 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Media keys
bindel = , XF86AudioRaiseVolume, exec, $scriptsDir/Volume.sh --inc
bindel = , XF86AudioLowerVolume, exec, $scriptsDir/Volume.sh --dec
bindl = , XF86AudioMute, exec, $scriptsDir/Volume.sh --toggle
bindl = , XF86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic
bindl = , XF86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , XF86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt
bindl = , XF86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindel = , XF86MonBrightnessUp, exec, $scriptsDir/Brightness.sh --inc
bindel = , XF86MonBrightnessDown, exec, $scriptsDir/Brightness.sh --dec

# Custom
bind = $mod SHIFT, period, exec, systemctl suspend
bind = CTRL, Print, exec, $scriptsDir/ScreenShot.sh --area
bind = , Print, exec, $scriptsDir/ScreenShot.sh --now
bind = $mod CTRL, l, exec, $scriptsDir/LockScreen.sh
bind = $mod, x, exec, $scriptsDir/LockScreen.sh
bind = $mod SHIFT, g, exec, $scriptsDir/GameMode.sh
