# -- Font ------------------------------------------------------------------
font_family      family="JetBrainsMono Nerd Font" style="Bold Italic"
bold_font        family="JetBrainsMono Nerd Font" style="Bold Italic"
italic_font      family="JetBrainsMono Nerd Font" style="Bold Italic"
bold_italic_font family="JetBrainsMono Nerd Font" style="Bold Italic"
font_size        14

# -- Cursor ----------------------------------------------------------------
cursor                 #cdd6f4
cursor_text_color      #0b0400
cursor_shape           block
cursor_blink_interval  0

# -- Scrollback ------------------------------------------------------------
scrollback_lines       10000
scroll_on_keystroke    no

# -- Window ----------------------------------------------------------------
hide_window_decorations    yes
window_padding_width       4
confirm_os_window_close    0
remember_window_size       yes
enabled_layouts            tall,fat,stack

# -- Background ------------------------------------------------------------
background_opacity         1.0
dynamic_background_opacity yes

# -- Bell ------------------------------------------------------------------
enable_audio_bell    no
visual_bell_duration 0.1

# -- Colors (Catppuccin Mocha with TokyoNight background) ------------------
foreground #cdd6f4
background #1a1b26

# Black
color0  #1e1e2e
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #f5c2e7
color13 #f5c2e7

# Cyan
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #a6adc8

# Selection
selection_foreground #1e1e2e
selection_background #f5e0dc

# URL
url_color #89b4fa
url_style curly

# Tab bar
active_tab_foreground   #1e1e2e
active_tab_background   #cdd6f4
inactive_tab_foreground #cdd6f4
inactive_tab_background #1e1e2e
tab_bar_style           powerline
tab_powerline_style     slanted

# -- Keybindings -----------------------------------------------------------
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

map ctrl+shift+enter new_window
map ctrl+shift+n     new_os_window

map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
