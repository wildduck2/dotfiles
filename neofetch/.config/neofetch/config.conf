# https://github.com/chick2d/neofetch-themes
# BMOfetch theme adapted for WildDuck Arch
# Made by https://github.com/donatienLeray

print_info() {
    prin "___________ˎ"
    prin "llo there! |"
    prin "ˉˉˉˉˉˉˉˉˉˉˉ´"
    info "$(color 1) USR" users
    info "$(color 2) OS " distro
    info "$(color 3) UP " uptime
    info "$(color 4)󰍛  CPU" cpu
    info "$(color 5) GPU" gpu
    info "$(color 6)󰟖 RAM" memory
    info "$(color 7) MEM" disk
    prin "$(color 1)󰈸 $(color 2)󱥰 $(color 2)$(color 3)󰩃 $(color 4) $(color 5) $(color 6)󰆥 $(color 7)󰤄 $(color 8) "
}

# -- Title -----------------------------------------------------------------
title_fqdn="off"

# -- Kernel ----------------------------------------------------------------
kernel_shorthand="on"

# -- Distro ----------------------------------------------------------------
distro_shorthand="off"
os_arch="off"

# -- Uptime ----------------------------------------------------------------
uptime_shorthand="on"

# -- Memory ----------------------------------------------------------------
memory_percent="on"
memory_unit="gib"

# -- Packages --------------------------------------------------------------
package_managers="on"

# -- Shell -----------------------------------------------------------------
shell_path="off"
shell_version="on"

# -- CPU -------------------------------------------------------------------
speed_type="bios_limit"
speed_shorthand="off"
cpu_brand="on"
cpu_speed="off"
cpu_cores="off"
cpu_temp="off"

# -- GPU -------------------------------------------------------------------
gpu_brand="on"
gpu_type="dedicated"

# -- Resolution ------------------------------------------------------------
refresh_rate="off"

# -- Gtk Theme / Icons / Font ----------------------------------------------
gtk_shorthand="off"
gtk2="on"
gtk3="on"

# -- IP Address ------------------------------------------------------------
public_ip_host="http://ident.me"
public_ip_timeout=2

# -- Desktop Environment --------------------------------------------------
de_version="on"

# -- Disk ------------------------------------------------------------------
disk_show=('/')
disk_subtitle="none"
disk_percent="on"

# -- Song ------------------------------------------------------------------
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"
mpc_args=()

# -- Text Colors -----------------------------------------------------------
colors=(distro)

# -- Text Options ----------------------------------------------------------
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"

# -- Color Blocks ----------------------------------------------------------
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# -- Progress Bars ---------------------------------------------------------
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

# -- Backend Settings ------------------------------------------------------
image_backend="ascii"
image_source="${HOME}/.config/neofetch/bmo.txt"

# -- Ascii Options ---------------------------------------------------------
ascii_distro="arch_small"
ascii_colors=(4 6 1 8 8 6)
ascii_bold="on"

# -- Image Options ---------------------------------------------------------
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=-44
yoffset=0
xoffset=0
background_color=

# -- Misc ------------------------------------------------------------------
stdout="off"
